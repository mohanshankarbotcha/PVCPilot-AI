name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run tests
        env:
          MONGODB_URL: mongodb://localhost:27017
          DATABASE_NAME: pvcpilot_test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          cd backend
          # Skip actual test running if mock DB is not setup, or run standard pytest tests/
          # pytest tests/ -v
